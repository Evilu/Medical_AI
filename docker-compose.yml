services:
  mongodb:
    image: mongo:7.0
    container_name: medical-search-mongodb
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_DATABASE: medical_search
    # Using tmpfs for ephemeral storage - data deleted on docker compose down
    tmpfs:
      - /data/db
    healthcheck:
      test: ["CMD", "mongosh", "--eval", "db.adminCommand('ping')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # MongoDB Express - Web UI for MongoDB
  mongo-express:
    image: mongo-express:latest
    container_name: medical-search-mongo-express
    ports:
      - "8081:8081"
    environment:
      ME_CONFIG_MONGODB_SERVER: mongodb
      ME_CONFIG_BASICAUTH_USERNAME: admin
      ME_CONFIG_BASICAUTH_PASSWORD: admin
    depends_on:
      mongodb:
        condition: service_healthy

  # Data Loader - Loads PubMed articles into MongoDB on first run
  data-loader:
    image: python:3.12-slim
    container_name: medical-search-data-loader
    working_dir: /app
    volumes:
      - ./scripts:/app
      - ./data:/data:ro
    environment:
      MONGO_URI: mongodb://mongodb:27017/
    command: >
      sh -c "
        pip install --quiet pymongo &&
        python load_data.py
      "
    depends_on:
      mongodb:
        condition: service_healthy
